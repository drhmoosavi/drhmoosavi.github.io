{{ define "main" }}
<section class="section-block">
  <h1 class="section-title">Blog</h1>
  {{ with .Content }}
    <p style="font-family: IBM Plex Mono, monospace; font-size: 1rem;">{{ . | plainify }}</p>
  {{ end }}
</section>

<section class="section-block">
  {{ range .Pages.ByDate.Reverse }}
    <article class="expertise-subsection" style="border-top: 2px dashed var(--h1-color); padding-top: 0.8rem; margin-bottom: 1rem;">
      <h2 style="font-family: Aleo, serif;"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p class="publication-date">{{ .Date.Format "January 2, 2006" }}</p>
      {{ with .Params.summary }}<p style="font-family: IBM Plex Mono, monospace; font-size: 0.98rem;">{{ . }}</p>{{ end }}
    </article>
  {{ end }}
</section>
{{ end }}
